name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check app tests

      - name: Compile Python sources
        run: python -m compileall -q app tests

      - name: Check installed dependencies
        run: python -m pip check

  container:
    name: container
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      IMAGE: ghcr.io/team-pinlog/cowork:${{ github.sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build immutable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE }}

      - name: Smoke-test image
        shell: bash
        run: |
          set -euo pipefail
          container_id=$(docker run --detach \
            --publish 127.0.0.1:18080:8080 \
            --env COWORK_ENV=development \
            --env COWORK_COOKIE_SECURE=false \
            --env JIRA_PROJECT_KEY=S15P11A705 \
            "$IMAGE")
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:18080/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$container_id"
          exit 1

  publish:
    name: publish
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/team-pinlog/cowork:${{ github.sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build immutable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE }}

      - name: Smoke-test image
        shell: bash
        run: |
          set -euo pipefail
          container_id=$(docker run --detach \
            --publish 127.0.0.1:18080:8080 \
            --env COWORK_ENV=development \
            --env COWORK_COOKIE_SECURE=false \
            --env JIRA_PROJECT_KEY=S15P11A705 \
            "$IMAGE")
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:18080/health; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 1
          done

      - name: Publish immutable image
        run: docker push "$IMAGE"
